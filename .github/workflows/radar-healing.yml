name: RADAR Healing

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  heal:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    uses: AKIVA-AI/akiva-enterprise-products/.github/workflows/shared-radar-healing.yml@main
    with:
      python_version: '3.11'
    secrets:
      STANDARDS_TOKEN: ${{ secrets.STANDARDS_TOKEN }}
